version: "3.9"

services:
  # ─────────────────────────  MySQL 8 ────────────────────────────────
  db:
    image: mysql:8.0
    container_name: library-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: library_db
      MYSQL_USER: library_user
      MYSQL_PASSWORD: library_pass
      MYSQL_ROOT_PASSWORD: root_pass
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────  Redis 7 ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: library-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────  FastAPI  ──────────────────────────────
  api:
    build: .
    container_name: library-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: "Library Management System"
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: "mysql+pymysql://library_user:library_pass@db:3306/library_db"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-please-change-me-in-production-use-openssl-rand-hex-32}"
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      MAX_BORROW_PER_USER: "5"
      DEFAULT_BORROW_DAYS: "14"
      DEFAULT_ADMIN_USERNAME: "admin"
      DEFAULT_ADMIN_EMAIL: "admin@library.example.com"
      DEFAULT_ADMIN_PASSWORD: "Admin@12345"
      CORS_ORIGINS: "*"
      CACHE_TTL_SECONDS: "60"
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs

  # ─────────────────────────  Frontend (static) ─────────────────────
  frontend:
    image: nginx:alpine
    container_name: library-frontend
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:80"

  # ─────────────────────────  Prometheus  ───────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: library-prometheus
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"

  # ─────────────────────────  Grafana  ──────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: library-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"

volumes:
  mysql_data:
  prometheus_data:
  grafana_data: